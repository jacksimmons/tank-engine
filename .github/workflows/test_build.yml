name: Build Compatibility Tests
on:
  push:
    branches: [ main, audio ]
jobs:
  build-on-windows:
    runs-on: windows-latest
    steps:
      - name: Setup
        uses: microsoft/setup-msbuild@v2

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          # token: ${{ secrets.PAT_TOKEN }}

      - name: Test
        run: |
          ./vs_build.bat
          more TankEngine.sln
          msbuild TankEditor/TankEditor.vcxproj /p:Platform=x64
          msbuild TankPlayer/TankPlayer.vcxproj /p:Platform=x64

  build-on-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          # token: ${{ secrets.PAT_TOKEN }}

      - name: Setup
        run: |
          sudo apt update
          xargs sudo apt-get -y install < apt-packages.txt
          sudo pip install -r requirements.txt
      
      - name: Test Editor build
        run: |
          python3 build.py gmake TankEditor
      
      - name: Test Player build
        run: |
          python3 build.py gmake TankPlayer